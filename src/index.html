<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professore Presente - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <header class="text-white p-3">
        <div class="d-flex align-items-center">
            <img src="https://minosse.unime.it/simplesaml/module.php/unime/img/logo_unime.jpg" alt="Logo" style="height: 50px; margin-right: 15px;">
            <h1 class="h4 m-0">Professore Presente</h1>
        </div>
    </header>

    <div class="main">
        <div class="form-container">
            <form id="loginForm">
                <h2>Login</h2>
                <p class="subtitle">Exam Queue System</p>

                <div id="error-message" style="display: none;" class="alert alert-danger"></div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input id="email" name="email" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Password" required>
                </div>

                <button type="submit" class="btn-submit">Login</button>

                <div class="auth-link">
                    <p>Don't have an account? <a href="signup.html">Sign up</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
