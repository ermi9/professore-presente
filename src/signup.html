<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professore Presente - Sign Up</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <header class="text-white p-3">
        <div style="display:flex; align-items:center;">
            <img src="logo.png" alt="Università degli Studi di Messina" style="height: 77px; margin-right: 20px;">
            <h1 style="font-size:20px; margin:0; color:white;">Professore Presente</h1>
        </div>
    </header>

    <div class="main">
        <div class="form-container">
            <form id="signupForm">
                <h2>Create Account</h2>
                <p class="subtitle">Exam Queue System</p>

                <!-- Error/success messages show up here -->
                <div id="message" style="display:none;" class="alert"></div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="your_username" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="At least 6 characters" required>
                </div>

                <button type="submit" class="btn-submit">Create Account</button>

                <div class="auth-link">
                    <p>Already have an account? <a href="index.html">Login</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="js/signup.js"></script>
</body>
</html>
