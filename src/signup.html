<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professore Presente — Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <header class="py-3 px-4 d-flex align-items-center gap-3">
        <span class="d-inline-flex" style="line-height:0">
            <img src="logo.png" alt="UniMe" height="64">
        </span>
        <h1 class="h5 m-0 text-white fw-semibold">Professore Presente</h1>
    </header>

    <div class="main">
        <div class="login-card">
            <h4 class="fw-bold mb-1" style="color:#006ec0">Create an Account</h4>
            <p class="subtitle">Exam Queue Management System</p>

            <div id="message" class="alert d-none"></div>

            <div class="mb-3">
                <label class="form-label fw-semibold small">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                    <input type="text" id="username" class="form-control border-start-0" placeholder="your_username" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold small">Email</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                    <input type="email" id="email" class="form-control border-start-0" placeholder="your@email.com" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold small">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                    <input type="password" id="password" class="form-control border-start-0" placeholder="At least 6 characters" required>
                </div>
            </div>

            <button class="btn-unime btn mb-3" onclick="doSignup()">
                <i class="bi bi-person-plus me-2"></i>Create Account
            </button>

            <p class="text-center text-muted small mb-0">
                Already have an account? <a href="index.html" style="color:#006ec0">Login</a>
            </p>
        </div>
    </div>

    <script src="js/signup.js"></script>
</body>
</html>
