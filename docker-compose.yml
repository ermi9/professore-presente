services:
  db:
    image: postgres:15-alpine
    container_name: professore_presente_db
    environment:
      POSTGRES_USER: professor
      POSTGRES_PASSWORD: secure_password_123
      POSTGRES_DB: professore_presente
    ports:
      - "5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U professor"]
      interval: 10s
      timeout: 5s
      retries: 5

  php:
    build: .
    container_name: professore_presente_php
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: professore_presente
      DB_USER: professor
      DB_PASSWORD: secure_password_123
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
